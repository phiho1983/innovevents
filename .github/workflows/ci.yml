name: CI InnovEvents

on:
  push:
    branches:
      - dev
      - main

  pull_request:
    branches:
      - dev
      - main

  workflow_dispatch:

jobs:
  backend:
    name: Backend Django
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: innovevents
          POSTGRES_USER: innovevents
          POSTGRES_PASSWORD: innovevents_pwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U innovevents -d innovevents"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: innovevents
          MONGO_INITDB_ROOT_PASSWORD: innovevents_mongo_pwd
          MONGO_INITDB_DATABASE: innovevents_logs
        ports:
          - 27017:27017

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://innovevents:innovevents_pwd@127.0.0.1:5432/innovevents
      REQUIRE_DB_SSL: "0"
      MONGO_URL: mongodb://innovevents:innovevents_mongo_pwd@127.0.0.1:27017/innovevents_logs?authSource=admin
      MONGO_DB: innovevents_logs
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    defaults:
      run:
        working-directory: apps/back

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/back/requirements.txt

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier la configuration Django
        run: python manage.py check

      - name: Vérifier les migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Appliquer les migrations
        run: python manage.py migrate --noinput

      - name: Exécuter les tests
        run: python manage.py test --verbosity=2
  
  frontend:
    name: Frontend React
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/front

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/front/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier le code avec ESLint
        run: npm run lint

      - name: Compiler l'application
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build