services:
  db:
    image: postgres:16
    container_name: innovevents_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-innovevents}
      POSTGRES_USER: ${POSTGRES_USER:-innovevents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovevents_pwd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - innovevents_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../innovevents-back
      dockerfile: ../innovevents-docker/docker/Dockerfile-backend
    container_name: innovevents_backend
    environment:
      DEBUG: "${DJANGO_DEBUG:-1}"
      SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-only-change-me}"
      ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-innovevents}:${POSTGRES_PASSWORD:-innovevents_pwd}@db:5432/${POSTGRES_DB:-innovevents}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-}"
    command: >
      sh -c "python manage.py migrate --noinput
      && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../innovevents-back:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../innovevents-front
      dockerfile: ../innovevents-docker/docker/Dockerfile-frontend
    container_name: innovevents_frontend
    environment:
      VITE_HOST: "0.0.0.0"
      VITE_PORT: "${FRONTEND_PORT:-5173}"
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8000}"
    command: >
      sh -c "npm ci
      && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../innovevents-front:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  innovevents_pgdata:
